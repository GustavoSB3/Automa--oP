<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <title>Conversor Excel para SQL</title>
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <div class="card shadow p-4">
        <h2 class="text-center mb-4">Conversor Excel para SQLite (.db)</h2>

        <div class="mb-3">
          <label for="excelInput" class="form-label"
            >Selecione sua planilha de logística:</label
          >
          <input
            class="form-control"
            type="file"
            id="excelInput"
            accept=".xlsx, .xls"
          />
        </div>

        <button onclick="enviarExcel()" class="btn btn-primary w-100">
          Converter e Baixar Banco de Dados
        </button>
      </div>
    </div>

    <script src="conection.js"></script>
  </body>
</html>
