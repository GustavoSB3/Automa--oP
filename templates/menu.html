<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conversor de Arquivos</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://kit.fontawesome.com/c1dd1409d9.js" crossorigin="anonymous"></script>

    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
  </head>

  <body class="bg-gray-100 min-h-screen flex items-start justify-center p-8">
    <div class="max-w-xl w-full">

      <!-- Botão voltar -->
      <a href="/" class="inline-flex items-center gap-2 text-sm text-gray-500 hover:text-gray-800 mb-6 transition">
        <i class="fa-solid fa-arrow-left"></i>
        Voltar
      </a>

      <!-- Título dinâmico -->
      <div class="text-center mb-8">
        <p class="text-sm font-semibold uppercase tracking-[0.3em] text-sky-600">Conversão de Arquivos</p>
        <h1 id="titulo" class="mt-3 text-3xl font-bold text-gray-800"></h1>
        <p id="subtitulo" class="mt-2 text-gray-500 text-sm"></p>
      </div>

      <!-- Card -->
      <div class="bg-white p-8 rounded-2xl shadow-md">

        <!-- XLSX → DB -->
        <div id="secao-xlsx-db" class="secao hidden">
          <label class="block text-sm font-medium text-gray-600 mb-2">Selecione o arquivo Excel (.xlsx ou .xls)</label>
          <input type="file" id="excelInput" accept=".xlsx,.xls"
            class="w-full mb-6 p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm"/>
          <button id="enviarExcel" onclick="enviarExcel()"
            class="w-full bg-blue-600 text-white py-3 rounded-xl hover:bg-blue-700 transition font-bold text-sm">
            <i class="fa-solid fa-download mr-2"></i>Converter e baixar .db
          </button>
        </div>

        <!-- DB → XLSX -->
        <div id="secao-db-xlsx" class="secao hidden">
          <label class="block text-sm font-medium text-gray-600 mb-2">Selecione o banco de dados (.db)</label>
          <input type="file" id="dbInput" accept=".db"
            class="w-full mb-6 p-3 border rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none text-sm"/>
          <button id="enviarDB" onclick="enviarDB()"
            class="w-full bg-emerald-600 text-white py-3 rounded-xl hover:bg-emerald-700 transition font-bold text-sm">
            <i class="fa-solid fa-download mr-2"></i>Converter e baixar .xlsx
          </button>
        </div>

        <!-- XLSX → CSV -->
        <div id="secao-xlsx-csv" class="secao hidden">
          <label class="block text-sm font-medium text-gray-600 mb-2">Selecione o arquivo Excel (.xlsx ou .xls)</label>
          <input type="file" id="CSVinput" accept=".xlsx,.xls"
            class="w-full mb-6 p-3 border rounded-xl focus:ring-2 focus:ring-amber-500 outline-none text-sm"/>
          <button id="enviarCSV" onclick="enviarCSV()"
            class="w-full bg-amber-500 text-white py-3 rounded-xl hover:bg-amber-600 transition font-bold text-sm">
            <i class="fa-solid fa-download mr-2"></i>Converter e baixar .csv
          </button>
        </div>

        <!-- PDF → DOCX -->
        <div id="secao-pdf-docx" class="secao hidden">
          <label class="block text-sm font-medium text-gray-600 mb-2">Selecione o arquivo PDF</label>
          <input type="file" id="pdfDocxInput" accept=".pdf"
            class="w-full mb-6 p-3 border rounded-xl focus:ring-2 focus:ring-red-500 outline-none text-sm"/>
          <button id="enviarPdfDocx" onclick="enviarPdfDocx()"
            class="w-full bg-red-500 text-white py-3 rounded-xl hover:bg-red-600 transition font-bold text-sm">
            <i class="fa-solid fa-download mr-2"></i>Converter e baixar .docx
          </button>
        </div>

        <!-- PDF → DB -->
        <div id="secao-pdf-db" class="secao hidden">
          <label class="block text-sm font-medium text-gray-600 mb-2">Selecione o arquivo PDF</label>
          <input type="file" id="pdfDbInput" accept=".pdf"
            class="w-full mb-6 p-3 border rounded-xl focus:ring-2 focus:ring-violet-500 outline-none text-sm"/>
          <button id="enviarPdfDb" onclick="enviarPdfDb()"
            class="w-full bg-violet-600 text-white py-3 rounded-xl hover:bg-violet-700 transition font-bold text-sm">
            <i class="fa-solid fa-download mr-2"></i>Converter e baixar .db
          </button>
        </div>

        <!-- Tipo inválido -->
        <div id="secao-invalido" class="secao hidden text-center text-gray-400 py-8">
          <i class="fa-solid fa-triangle-exclamation text-3xl mb-3"></i>
          <p>Tipo de conversão não encontrado.</p>
          <a href="/" class="text-sky-600 hover:underline text-sm mt-2 inline-block">Voltar ao início</a>
        </div>

      </div>
    </div>

    <script src="{{ url_for('static', filename='conection.js') }}"></script>
    <script>
      const config = {
        'xlsx-db':  { titulo: 'Excel → Banco de Dados', subtitulo: 'Converta sua planilha .xlsx para um banco SQLite .db' },
        'db-xlsx':  { titulo: 'Banco de Dados → Excel',  subtitulo: 'Exporte as tabelas do seu banco .db para planilha .xlsx' },
        'xlsx-csv': { titulo: 'Excel → CSV',              subtitulo: 'Converta sua planilha .xlsx para o formato .csv' },
        'pdf-docx': { titulo: 'PDF → Word',               subtitulo: 'Converta seu arquivo PDF para documento .docx' },
        'pdf-db':   { titulo: 'PDF → Banco de Dados',     subtitulo: 'Converta seu arquivo PDF para um banco SQLite .db' },
      };

      const tipo = new URLSearchParams(window.location.search).get('tipo');
      const cfg = config[tipo];

      if (cfg) {
        document.getElementById('titulo').textContent = cfg.titulo;
        document.getElementById('subtitulo').textContent = cfg.subtitulo;
        document.getElementById(`secao-${tipo}`).classList.remove('hidden');
      } else {
        document.getElementById('titulo').textContent = 'Tipo inválido';
        document.getElementById('secao-invalido').classList.remove('hidden');
      }
    </script>
  </body>
</html>
