<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Mesclar PDFs</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet" />
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <div class="card p-4 shadow">
        <h3 class="mb-3">Mesclar PDFs</h3>

        <input
          class="form-control mb-3"
          type="file"
          id="pdfInput"
          multiple
          accept="application/pdf" />

        <button class="btn btn-primary w-100" onclick="enviarPDFs()">
          Mesclar e Baixar
        </button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
