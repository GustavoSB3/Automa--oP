<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Conversor Excel ↔ DB</title>

    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <script>
    window.va =
      window.va ||
      function () {
        (window.vaq = window.vaq || []).push(arguments);
      };
  </script>
  <script defer src="/_vercel/analytics/script.js"></script>

  <body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="max-w-4xl w-full p-6">
      <!-- Título -->
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-800">
          Conversor Excel ↔ SQLite
        </h1>
        <p class="text-gray-500 mt-2">
          Converta arquivos Excel para banco de dados e vice-versa
        </p>
      </div>

      <!-- Cards -->
      <div class="grid md:grid-cols-2 gap-6">
        <!-- Excel → DB -->
        <div
          class="bg-white p-6 rounded-2xl shadow-md hover:shadow-lg transition">
          <h2 class="text-xl font-semibold mb-4 text-gray-700">
            📥 Excel → Banco (.db)
          </h2>

          <input
            type="file"
            id="excelInput"
            accept=".xlsx, .xls"
            class="w-full mb-4 p-2 border rounded-lg" />

          <button
            onclick="enviarExcel()"
            class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
            Converter e baixar
          </button>
        </div>

        <!-- DB → Excel -->
        <div
          class="bg-white p-6 rounded-2xl shadow-md hover:shadow-lg transition">
          <h2 class="text-xl font-semibold mb-4 text-gray-700">
            📤 Banco (.db) → Excel
          </h2>

          <input
            type="file"
            id="dbInput"
            accept=".db"
            class="w-full mb-4 p-2 border rounded-lg" />

          <button
            onclick="enviarDB(this)"
            class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition">
            Converter e baixar para Excel
          </button>
        </div>
      </div>
    </div>

    <script src="{{ url_for('static', filename='conection.js') }}"></script>
  </body>
</html>
